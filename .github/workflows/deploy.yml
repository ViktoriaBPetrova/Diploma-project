name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: healthyrecipes
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore HealthyRecipes/HealthyRecipes.sln
    
    - name: Build
      run: dotnet build HealthyRecipes/HealthyRecipes.sln --configuration Release --no-restore
    
    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef
    
    - name: Run database migrations
      run: |
        cd HealthyRecipes
        dotnet ef database update --project HealthyRecipes.Data/HealthyRecipes.Data.csproj --startup-project HealthyRecipes/HealthyRecipes.Web.csproj --connection "${{ secrets.PRODUCTION_CONNECTION_STRING }}"
    
    - name: Publish
      run: dotnet publish HealthyRecipes/HealthyRecipes/HealthyRecipes.Web.csproj -c Release -o ./publish
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
